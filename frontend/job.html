<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edu-Homework · Composing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>

<header class="masthead">
  <a href="/ui/" class="nameplate">Edu—Homework</a>
  <span class="colophon">In the press</span>
</header>

<main>
  <p class="eyebrow">In Press</p>
  <h1 class="display"><em>Composing</em> homework.</h1>
  <p class="lede">The compositor reads the lesson, classifies it, and runs each phase of the curriculum sequence in turn. Phases appear below as they begin and resolve.</p>

  <div id="diff"></div>
  <div id="phases" class="phases"></div>
  <div id="done"></div>
</main>

<footer>composed via /api/v1/jobs</footer>

<script src="app.js"></script>
<script>
const params = new URLSearchParams(location.search);
const jobId = params.get("id");
if (!jobId) {
  document.body.appendChild(window.el("p", {className: "error-text", text: "missing ?id="}));
  throw new Error("missing id");
}

const phases = document.getElementById("phases");
const diff = document.getElementById("diff");
const done = document.getElementById("done");
const phaseEls = new Map();

function pad2(n) { return String(n).padStart(2, "0"); }

function prettyName(s) {
  return s.replace(/-/g, " ")
          .replace(/\b\w/g, c => c.toUpperCase());
}

function ensurePhaseEl(name, order) {
  if (phaseEls.has(name)) return phaseEls.get(name);

  const wrap = window.el("article", {className: "phase running"});
  const head = window.el("div", {className: "phase-head"});

  const num = window.el("div", {className: "phase-num", text: pad2(order + 1) + "."});
  const title = window.el("div", {className: "phase-name", text: prettyName(name)});

  const status = window.el("div", {className: "phase-status"});
  const dot = window.el("span", {className: "dot"});
  const statusText = window.el("span", {text: "running"});
  status.appendChild(dot);
  status.appendChild(statusText);

  head.appendChild(num);
  head.appendChild(title);
  head.appendChild(status);
  wrap.appendChild(head);
  phases.appendChild(wrap);

  const cell = {wrap, num, title, dot, statusText, output: null, meta: null};
  phaseEls.set(name, cell);
  return cell;
}

function setPhaseDone(d) {
  const cell = ensurePhaseEl(d.phase_name, d.phase_order);
  cell.wrap.className = "phase done";
  cell.statusText.textContent = "ready";

  if (cell.output) {
    cell.wrap.removeChild(cell.output);
    cell.output = null;
  }
  if (d.output_md) {
    const limit = 600;
    const preview = d.output_md.length > limit
      ? d.output_md.slice(0, limit).trimEnd() + " …"
      : d.output_md;
    cell.output = window.el("div", {className: "phase-output", text: preview});
    cell.wrap.appendChild(cell.output);
  }

  if (cell.meta) {
    cell.wrap.removeChild(cell.meta);
    cell.meta = null;
  }
  cell.meta = window.el("div", {className: "phase-meta"});
  const tin = d.tokens_input ?? "?";
  const tout = d.tokens_output ?? "?";
  cell.meta.appendChild(window.el("span", {text: `tokens in · ${tin}`}));
  cell.meta.appendChild(window.el("span", {text: `tokens out · ${tout}`}));
  cell.wrap.appendChild(cell.meta);
}

function setPhaseError(phaseName, message) {
  if (!phaseName) return;
  const cell = phaseEls.get(phaseName);
  if (!cell) return;
  cell.wrap.className = "phase error";
  cell.statusText.textContent = "failed";
}

window.streamSse(`/api/v1/jobs/${encodeURIComponent(jobId)}/stream`, {
  phase_started: (d) => ensurePhaseEl(d.phase_name, d.phase_order),
  phase_completed: (d) => setPhaseDone(d),
  difficulty_classified: (d) => {
    window.clear(diff);
    diff.appendChild(window.el("span", {
      className: "difficulty",
      text: String(d.difficulty),
    }));
  },
  job_completed: (d) => {
    window.clear(done);
    const card = window.el("div", {className: "download-card"});
    card.appendChild(window.el("div", {className: "label", text: "Homework ready"}));
    card.appendChild(window.el("a", {
      text: "Download the assembled session",
      href: d.download_url,
      attrs: {download: ""},
    }));
    done.appendChild(card);
  },
  error: (d) => {
    setPhaseError(d.phase_name, d.message);
    window.clear(done);
    done.appendChild(window.el("p", {
      className: "error-text",
      text: `Error · ${d.message}`,
    }));
  },
});
</script>
</body>
</html>
