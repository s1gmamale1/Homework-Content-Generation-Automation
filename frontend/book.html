<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0908">
<title>Edu-Homework · Sections</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>

<header class="masthead">
  <a href="/ui/" class="nameplate">
    <span class="nameplate-mark">e</span>
    <span>Edu-Homework</span>
  </a>
  <span class="colophon">Index of the volume</span>
</header>

<main>
  <span class="eyebrow">Pick a Section</span>
  <h1 class="display">Choose what to <em>study</em>.</h1>
  <p class="status" id="status">Reading the volume…</p>
  <ol class="toc" id="list"></ol>
</main>

<footer>indexed via /api/v1/books</footer>

<script src="app.js"></script>
<script>
const params = new URLSearchParams(location.search);
const bookId = params.get("id");
if (!bookId) {
  document.body.appendChild(window.el("p", {className: "error-text", text: "missing ?id="}));
  throw new Error("missing id");
}

const status = document.getElementById("status");
const list = document.getElementById("list");

function pad2(n) { return String(n).padStart(2, "0"); }

function renderToc(entries) {
  window.clear(list);
  const n = entries.length;
  status.textContent = `${n} section${n === 1 ? "" : "s"} indexed · pick one to compose homework.`;

  entries.forEach((e, idx) => {
    const li = window.el("li", {className: "toc-item"});

    const num = window.el("div", {className: "toc-num", text: pad2(idx + 1)});

    const text = window.el("div", {className: "toc-text"});
    if (e.chapter_title) {
      text.appendChild(window.el("div", {className: "toc-chapter", text: e.chapter_title}));
    }
    const titleStr = e.section_number
      ? `${e.section_number} · ${e.section_title}`
      : e.section_title;
    text.appendChild(window.el("div", {className: "toc-title", text: titleStr}));

    let pagesStr = "";
    if (e.page_start) {
      pagesStr = `p. ${e.page_start}`;
      if (e.page_end && e.page_end !== e.page_start) pagesStr += `–${e.page_end}`;
    }
    const pages = window.el("div", {className: "toc-pages", text: pagesStr});

    li.appendChild(num);
    li.appendChild(text);
    if (pagesStr) li.appendChild(pages);

    li.addEventListener("click", async () => {
      li.style.opacity = 0.4;
      li.style.pointerEvents = "none";
      status.textContent = "Sending to compositor…";
      try {
        const job = await window.generate(bookId, e.id);
        location.href = `/ui/job.html?id=${encodeURIComponent(job.id)}`;
      } catch (err) {
        status.textContent = err.message;
        li.style.opacity = 1;
        li.style.pointerEvents = "auto";
      }
    });

    list.appendChild(li);
  });
}

const STATUS_LABEL = {
  uploading: "Uploading manuscript…",
  toc_extracting: "Indexing chapters and sections…",
};

window.streamSse(`/api/v1/books/${encodeURIComponent(bookId)}/toc/stream`, {
  status: (d) => status.textContent = STATUS_LABEL[d.status] || d.status,
  toc_ready: (d) => renderToc(d.entries),
  error: (d) => {
    status.textContent = "";
    window.clear(list);
    list.appendChild(window.el("li", {className: "error-text", text: `Error · ${d.message}`}));
  },
});
</script>
</body>
</html>
