services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edu
      POSTGRES_DB: edu_homework
    volumes:
      - edu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U edu -d edu_homework" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - local-network

  api:
    build: .
    image: class-homework-builder:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://edu:edu@postgres:5432/edu_homework
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env or export it}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      JOB_TIMEOUT_SECONDS: ${JOB_TIMEOUT_SECONDS:-600}
      QUEUE_MAX_ATTEMPTS: ${QUEUE_MAX_ATTEMPTS:-3}
      QUEUE_BACKPRESSURE_LIMIT: ${QUEUE_BACKPRESSURE_LIMIT:-50}
      GEMINI_MAX_CONCURRENCY: ${GEMINI_MAX_CONCURRENCY:-8}
      ENABLE_DOCS: ${ENABLE_DOCS:-false}
      ALLOW_ORIGINS: ${ALLOW_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - shared-network
      - local-network
    labels:
      traefik.enable: "true"
      traefik.http.routers.backend.rule: "Host(`edu-homework.jakhongir.dev`)"
      traefik.http.routers.backend.entrypoints: "websecure"
      traefik.http.routers.backend.tls.certresolver: "le"
      traefik.http.services.backend.loadbalancer.server.port: "8000"
      traefik.docker.network: "shared-network"

  # Optional standalone worker for horizontal scaling. Activate with:
  #   docker compose --profile scaled up
  # and set WORKER_CONCURRENCY=0 on the api service in your environment.
  worker:
    build: .
    image: class-homework-builder:latest
    command: [ "python", "-m", "app.services.worker" ]
    profiles: [ "scaled" ]
    environment:
      DATABASE_URL: postgresql+asyncpg://edu:edu@postgres:5432/edu_homework
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env or export it}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      JOB_TIMEOUT_SECONDS: ${JOB_TIMEOUT_SECONDS:-600}
      QUEUE_MAX_ATTEMPTS: ${QUEUE_MAX_ATTEMPTS:-3}
      GEMINI_MAX_CONCURRENCY: ${GEMINI_MAX_CONCURRENCY:-8}
      RUN_MIGRATIONS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: 2  # adjust to taste — `--scale worker=N` on CLI also works
    networks:
      - local-network

volumes:
  edu_pgdata:

networks:
  local-network:
    driver: bridge
  shared-network:
    external: true
