services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu}
      POSTGRES_DB: ${POSTGRES_DB:-edu_homework}
    volumes:
      - edu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu} -d ${POSTGRES_DB:-edu_homework}" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - local-network

  api:
    image: ${IMAGE:-ghcr.io/ganiyevuz/class-homework-builder:latest}
    pull_policy: always
    env_file:
      - .env
    environment:
      # Constructed from postgres credentials so it stays in sync.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edu_homework}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - shared-network
      - local-network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "shared-network"
      traefik.http.routers.edu-homework.rule: "Host(`${APP_HOST:-edu-homework.jakhongir.dev}`)"
      traefik.http.routers.edu-homework.entrypoints: "websecure"
      traefik.http.routers.edu-homework.tls.certresolver: "le"
      traefik.http.routers.edu-homework.service: "edu-homework"
      traefik.http.services.edu-homework.loadbalancer.server.port: "8000"
      com.centurylinklabs.watchtower.enable: "true"

  # Optional standalone worker for horizontal scaling. Activate with:
  #   docker compose --profile scaled up
  # and set WORKER_CONCURRENCY=0 on the api service in your environment.
  worker:
    image: ${IMAGE:-ghcr.io/ganiyevuz/class-homework-builder:latest}
    pull_policy: always
    command: [ "python", "-m", "app.services.worker" ]
    profiles: [ "scaled" ]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu}@postgres:5432/${POSTGRES_DB:-edu_homework}
      RUN_MIGRATIONS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: 2  # adjust to taste — `--scale worker=N` on CLI also works
    networks:
      - local-network
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # Polls GHCR for updated tags on labeled containers and redeploys them.
  # Reuses the host's docker login (~/.docker/config.json) for private GHCR.
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_CLEANUP: "true"           # remove old images after update
      WATCHTOWER_LABEL_ENABLE: "true"       # only update opted-in containers
      WATCHTOWER_POLL_INTERVAL: "60"        # seconds; bump to 300+ in prod
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      # Match the host daemon's API version (check with: docker version --format '{{.Server.APIVersion}}').
      DOCKER_API_VERSION: "1.53"
      TZ: ${TZ:-UTC}

volumes:
  edu_pgdata:

networks:
  local-network:
    driver: bridge
  shared-network:
    external: true
